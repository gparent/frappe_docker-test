name: Build Lixi

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
        description: "App module and image name, for example 'crm'"
        default: lixi
      app_repo:
        required: true
        type: string
        description: "Git URL or GitHub slug for the app repository"
        default: gparent/frappe_lixi-test
      app_ref:
        required: true
        type: string
        description: "Git branch or tag to install for the app"
        default: develop
      builder_repository:
        required: false
        type: string
        default: frappe/frappe_docker
        description: "Repository that contains the Containerfile and helper scripts"
      builder_ref:
        required: false
        type: string
        default: main
        description: "Ref to checkout from the builder repository"
      frappe_repo:
        required: true
        type: string
        description: GitHub repository for Frappe
        default: https://github.com/frappe/frappe
      frappe_ref:
        required: true
        type: string
        description: "Frappe branch or version tag, for example version-16"
        default: version-15
      image_name:
        required: true
        type: string
        description: "Full image name, for example ghcr.io/frappe/crm"
        default: ghcr.io/gparent/erpnext
      image_tag:
        required: true
        type: string
        description: "Image tag, for example develop or v16.0.0"
        default: develop
      push:
        required: true
        type: boolean
      registry:
        required: false
        type: string
        default: ghcr.io
#      version:
#        required: true
#        type: string
#        description: "Major version, git tags should match 'v{version}.*'; or 'develop'"
#      python_version:
#        required: true
#        type: string
#        description: Python version
#      node_version:
#        required: true
#        type: string
#        description: NodeJS version
#    secrets:
#      docker_github_token:
#        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BUILDER_DIR: builder
      APPS_JSON_PATH: builder/.github/tmp/apps.json
      CACHE_SCOPE: app-image-lixi-${{ inputs.frappe_ref }}
      TEST_IMAGE: local/${{ inputs.app_name }}:${{ github.run_id }}-${{ github.run_attempt }}
      FINAL_IMAGE: ${{ inputs.image_name }}:${{ inputs.image_tag }}

    steps:
      - name: Checkout builder repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.builder_repository }}
          ref: ${{ inputs.builder_ref }}
          path: ${{ env.BUILDER_DIR }}

#      - name: Setup QEMU
#        uses: docker/setup-qemu-action@v4
#        with:
#          image: tonistiigi/binfmt:latest
#          platforms: all

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create apps.json
        env:
          GITHUB_TOKEN: ${{ secrets.DOCKER_GITHUB_TOKEN }}
          APP_REPO: ${{ inputs.app_repo }}
          APP_REF: ${{ inputs.app_ref }}
          APPS_JSON_PATH: ${{ env.APPS_JSON_PATH }}
        run: |
          mkdir -p "$(dirname "$APPS_JSON_PATH")"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          contents = []

          token = os.environ["GITHUB_TOKEN"].strip()

          repo = os.environ["APP_REPO"].strip()
          ref = os.environ["APP_REF"].strip()

          if repo.count("/") == 1 and not repo.startswith(("https://", "http://")):
              repo = f"https://{token}@github.com/{repo}"

          for prefix in ("refs/heads/", "refs/tags/"):
              if ref.startswith(prefix):
                  ref = ref.removeprefix(prefix)

          contents += {"url": "https://github.com/frappe/erpnext.git", "branch": "version-15"}
          contents += {"url": "https://github.com/frappe/hrms.git", "branch": "version-15"}
          contents += {"url": repo, "branch": ref}
          contents += {"url": f"https://${token}@github.com/gparent/lixi_theme.git", "branch": "v0.0.3"}
          contents += {"url": f"https://${token}@github.com/gparent/lixi_convert.git", "branch": "develop"}

          Path(os.environ["APPS_JSON_PATH"]).write_text(
              json.dumps(contents, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name:
        run: |
          echo "APPS_JSON_BASE64=$(base64 -w 0 $APPS_JSON_PATH)" >> $GITHUB_OUTPUT
        id: apps_json

      - name: Build app image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.BUILDER_DIR }}
          file: ${{ env.BUILDER_DIR }}/images/custom/Containerfile
          build-args: |
            APPS_JSON_BASE64=${{ steps.apps_json.outputs.APPS_JSON_BASE64 }}
            FRAPPE_IMAGE_PREFIX=${{ inputs.frappe_image_prefix }}
            FRAPPE_PATH=${{ inputs.frappe_repo }}
            FRAPPE_BRANCH=${{ inputs.frappe_ref }}
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}
          load: true
          platforms: linux/amd64
          tags: ${{ env.TEST_IMAGE }}

      - name: Smoke test image contents
        env:
          APP_NAME: ${{ inputs.app_name }}
          TEST_IMAGE: ${{ env.TEST_IMAGE }}
        run: |
          docker run --rm --entrypoint bash "$TEST_IMAGE" -lc \
            "test -d /home/frappe/frappe-bench/apps/frappe && test -d /home/frappe/frappe-bench/apps/${APP_NAME}"

      - name: Login to GHCR
        if: ${{ inputs.push && inputs.registry == 'ghcr.io' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to target registry
        if: ${{ inputs.push && inputs.registry != 'ghcr.io' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Push multi-arch image
        if: ${{ inputs.push }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.BUILDER_DIR }}
          file: ${{ env.BUILDER_DIR }}/images/custom/Containerfile
          build-args: |
            APPS_JSON_BASE64=${{ steps.apps_json.outputs.APPS_JSON_BASE64 }}
            FRAPPE_IMAGE_PREFIX=${{ inputs.frappe_image_prefix }}
            FRAPPE_PATH=${{ inputs.frappe_repo }}
            FRAPPE_BRANCH=${{ inputs.frappe_ref }}
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.FINAL_IMAGE }}
